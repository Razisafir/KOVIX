name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Construct unit tests
        run: npx jest --config jest.construct.cjs --selectProjects construct-services --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Check TypeScript compilation
        run: npx tsc -p tsconfig.construct.json --noEmit

      - name: Enforce coverage threshold
        run: npx jest --config jest.construct.cjs --selectProjects construct-services --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx tsc -p tsconfig.construct.json --noEmit
