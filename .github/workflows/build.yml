# .github/workflows/build.yml
# CONSTRUCT IDE — Multi-platform Build Pipeline
# Builds DEB/RPM (Linux), ZIP/Setup (Windows), ZIP (macOS Intel + ARM)
# Uses VS Code's native gulp packaging + electron-builder for additional formats

name: Build CONSTRUCT IDE

on:
  push:
    branches: [enhancement/main, main]
    tags: ['v*']
  pull_request:
    branches: [enhancement/main, main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'beta'
        type: choice
        options:
          - dev
          - beta
          - release

permissions:
  contents: write
  actions: read

jobs:
  # ─── QUALITY GATES ───
  compile-check:
    name: TypeScript Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev libsecret-1-dev libkrb5-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile TypeScript (noEmit)
        run: |
          npx tsc -p src/tsconfig.json --noEmit > compile.log 2>&1 || true
          # Filter out known pre-existing VS Code core errors (TS6133 in theme files)
          NEW_ERRORS=$(grep "error TS" compile.log | grep -v "workbenchThemeService.ts" | grep -v "themeConfiguration.ts" || true)
          cat compile.log
          if [ -n "$NEW_ERRORS" ]; then
            echo "::error::New TypeScript compilation errors found:"
            echo "$NEW_ERRORS"
            exit 1
          fi
          echo "Compile check passed (2 pre-existing TS6133 errors in VS Code core are expected)"

      - name: Check singleton count
        run: |
          COUNT=$(grep -c "registerSingleton" src/vs/workbench/contrib/construct/browser/construct.contribution.ts)
          echo "Singleton count: $COUNT"
          if [ "$COUNT" -lt 45 ]; then
            echo "::error::Expected 45+ singletons, found $COUNT"
            exit 1
          fi

      - name: Check for TODO/FIXME in production code
        run: |
          COUNT=$(grep -r "TODO\|FIXME" src/vs/workbench/contrib/construct/ | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::Found $COUNT TODO/FIXME in production code"
            grep -r "TODO\|FIXME" src/vs/workbench/contrib/construct/
          fi

  # ─── LINUX BUILD ───
  build-linux:
    name: Build Linux (DEB + RPM + ZIP)
    needs: compile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbfile-dev \
            libsecret-1-dev \
            libkrb5-dev \
            libnss3 \
            libgtk-3-0 \
            libxss1 \
            libasound2t64 \
            libgbm1 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxtst6 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0 \
            libgbm-dev \
            libnotify-dev \
            libatspi2.0-0 \
            libuuid1 \
            rpm \
            fakeroot \
            xdg-utils

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        run: npm run compile
        env:
          npm_config_arch: x64

      - name: Download Electron
        run: node build/lib/electron.js

      - name: Package VS Code (Linux x64)
        run: npx gulp vscode-linux-x64
        env:
          npm_config_arch: x64
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build DEB package
        run: npx gulp vscode-linux-x64-build-deb
        continue-on-error: true

      - name: Build RPM package
        run: npx gulp vscode-linux-x64-build-rpm
        continue-on-error: true

      - name: Create tar.gz archive
        run: |
          cd .build/linux/x64
          tar -czf /tmp/construct-ide-linux-x64.tar.gz VSCode-linux-x64/
        continue-on-error: true

      - name: Collect and list Linux artifacts
        run: |
          mkdir -p /tmp/linux-artifacts
          # Collect from VS Code gulp output
          find .build/linux -type f \( -name "*.deb" -o -name "*.rpm" \) -exec cp {} /tmp/linux-artifacts/ \; 2>/dev/null || true
          # Collect tar.gz
          cp /tmp/construct-ide-linux-x64.tar.gz /tmp/linux-artifacts/ 2>/dev/null || true
          echo "=== Linux artifacts ==="
          ls -lh /tmp/linux-artifacts/ || echo "No artifacts found"
          echo "=== .build/linux structure ==="
          find .build/linux -type f | head -20 || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: /tmp/linux-artifacts/**
          if-no-files-found: warn

  # ─── WINDOWS BUILD ───
  build-windows:
    name: Build Windows (ZIP + Setup)
    needs: compile-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        run: npm run compile
        shell: pwsh

      - name: Download Electron
        run: node build/lib/electron.js
        shell: pwsh

      - name: Package VS Code (Win32 x64)
        run: npx gulp vscode-win32-x64
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build Windows setup (InnoSetup)
        run: npx gulp vscode-win32-x64-system-setup
        shell: pwsh
        continue-on-error: true

      - name: Build Windows user setup
        run: npx gulp vscode-win32-x64-user-setup
        shell: pwsh
        continue-on-error: true

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path ".build\win32-x64\VSCode-win32-x64\*" -DestinationPath "construct-ide-win32-x64.zip"
        shell: pwsh
        continue-on-error: true

      - name: Collect and list Windows artifacts
        run: |
          New-Item -ItemType Directory -Force -Path C:\temp\windows-artifacts
          Copy-Item ".build\win32-x64\*.exe" C:\temp\windows-artifacts\ -ErrorAction SilentlyContinue
          Copy-Item ".build\win32-x64\*.msi" C:\temp\windows-artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "construct-ide-win32-x64.zip" C:\temp\windows-artifacts\ -ErrorAction SilentlyContinue
          Get-ChildItem C:\temp\windows-artifacts\ | Format-Table Name, Length
          Write-Host "=== .build/win32-x64 structure ==="
          Get-ChildItem -Recurse .build\win32-x64 -File | Select-Object -First 20 | Format-Table FullName, Length
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: C:\temp\windows-artifacts\*
          if-no-files-found: warn

  # ─── MACOS BUILD (Intel x64) ───
  build-macos-intel:
    name: Build macOS Intel (ZIP)
    needs: compile-check
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        run: node --max-old-space-size=4096 ./node_modules/gulp/bin/gulp.js compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Electron
        run: node build/lib/electron.js

      - name: Package VS Code (Darwin x64)
        run: npx gulp vscode-darwin-x64
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Create ZIP archive
        run: |
          cd .build/darwin/x64
          zip -r /tmp/construct-ide-darwin-x64.zip VSCode-darwin-x64.app/
        continue-on-error: true

      - name: Collect and list macOS Intel artifacts
        run: |
          mkdir -p /tmp/macos-intel-artifacts
          cp /tmp/construct-ide-darwin-x64.zip /tmp/macos-intel-artifacts/ 2>/dev/null || true
          echo "=== macOS Intel artifacts ==="
          ls -lh /tmp/macos-intel-artifacts/ || echo "No artifacts found"
          echo "=== .build/darwin structure ==="
          find .build/darwin -type f | head -20 || true

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-builds
          path: /tmp/macos-intel-artifacts/**
          if-no-files-found: warn

  # ─── MACOS BUILD (Apple Silicon ARM64) ───
  build-macos-arm:
    name: Build macOS Apple Silicon (ZIP)
    needs: compile-check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile
        run: node --max-old-space-size=4096 ./node_modules/gulp/bin/gulp.js compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Electron
        run: node build/lib/electron.js

      - name: Package VS Code (Darwin arm64)
        run: npx gulp vscode-darwin-arm64
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Create ZIP archive
        run: |
          cd .build/darwin-arm64
          zip -r /tmp/construct-ide-darwin-arm64.zip VSCode-darwin-arm64.app/
        continue-on-error: true

      - name: Collect and list macOS ARM artifacts
        run: |
          mkdir -p /tmp/macos-arm-artifacts
          cp /tmp/construct-ide-darwin-arm64.zip /tmp/macos-arm-artifacts/ 2>/dev/null || true
          echo "=== macOS ARM artifacts ==="
          ls -lh /tmp/macos-arm-artifacts/ || echo "No artifacts found"
          echo "=== .build/darwin-arm64 structure ==="
          find .build/darwin-arm64 -type f | head -20 || true

      - name: Upload macOS ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-builds
          path: /tmp/macos-arm-artifacts/**
          if-no-files-found: warn

  # ─── RELEASE JOB ───
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          body: |
            ## CONSTRUCT IDE ${{ github.ref_name }}

            ### What's New
            - 8 parallel specialized AI agents with dependency graph scheduling
            - 10,000+ MCP tool connectors via native marketplace
            - 4-layer persistent memory (Working/Episodic/Semantic/Procedural)
            - Real-time browser automation with Playwright
            - 3D/Visual creation via Three.js, Figma, Blender
            - Semantic codebase indexing with Tree-sitter + Qdrant
            - Real-time collaboration with Yjs CRDT + shared agents
            - Visual execution timeline with Gantt chart
            - Transparent credit-based pricing (1 credit = 1 action)
            - Privacy-first telemetry with differential privacy
            - GOD Mode: Autonomous multi-agent execution with milestone control

            ### Installation

            **Linux**: Download `.deb` (Debian/Ubuntu) or `.rpm` (Fedora/RHEL) or `.tar.gz` (universal)
            **Windows**: Download `.exe` (installer) or `.zip` (portable)
            **macOS Intel**: Download `-x64.zip`
            **macOS Apple Silicon**: Download `-arm64.zip`

            ### System Requirements
            - RAM: 8GB minimum, 16GB recommended
            - Disk: 2GB free space
            - OS: Windows 10+, macOS 12+, Ubuntu 20.04+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
