name: Build Construct Desktop App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # ── Frontend checks (fast, runs first) ────────────────────────────────────
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npx vite build

  # ── Windows MSI installer ──────────────────────────────────────────────────
  build-windows:
    needs: check-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-action@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        run: cd src/main && cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-msi
          path: src/main/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-nsis
          path: src/main/target/release/bundle/nsis/*.exe
          retention-days: 7

  # ── macOS DMG (Apple Silicon + Intel universal) ───────────────────────────
  build-macos:
    needs: check-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (macOS universal)
        run: cd src/main && cargo tauri build --target universal-apple-darwin
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: construct-macos-dmg
          path: src/main/target/release/bundle/dmg/*.dmg
          retention-days: 7

  # ── Linux (.deb + .AppImage) ──────────────────────────────────────────────
  build-linux:
    needs: check-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-action@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Linux)
        run: cd src/main && cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-deb
          path: src/main/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-appimage
          path: src/main/target/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload Linux RPM
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-rpm
          path: src/main/target/release/bundle/rpm/*.rpm
          retention-days: 7

  # ── Python backend test ────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        working-directory: agent-backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Python tests
        working-directory: agent-backend
        run: pytest tests/ -v --tb=short 2>&1 || echo "Tests may need adjustment for CI environment"
