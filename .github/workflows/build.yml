name: Build Construct IDE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Transpile client
        run: npx gulp transpile-client
        timeout-minutes: 10

      - name: Build Windows package
        run: npx gulp vscode-win32-x64-min-ci
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows system setup
        run: npx gulp vscode-win32-x64-system-setup
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List setup output
        run: dir .build\win32-x64\system-setup\

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: construct-ide-windows-x64
          path: .build/win32-x64/system-setup/*.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: .build/win32-x64/system-setup/*.exe
          tag_name: v0.2.0-beta.1
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm libkrb5-dev

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Transpile client
        run: npx gulp transpile-client
        timeout-minutes: 10

      - name: Build Linux package
        run: npx gulp vscode-linux-x64-min-ci
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux DEB
        run: npx gulp vscode-linux-x64-build-deb
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: construct-ide-linux-x64
          path: .build/linux/deb/amd64/**/*.deb
