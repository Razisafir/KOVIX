name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # -- Windows -------------------------------------------------------------
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps + PyInstaller
        shell: bash
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        shell: bash
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify frontend dist
        shell: bash
        run: |
          echo "--- dist/ contents ---"
          ls -la dist/ | head -20

      - name: Show tauri CLI version
        shell: bash
        run: npx tauri --version

      - name: Show tauri info
        shell: bash
        run: npx tauri info 2>&1 || true

      - name: Build Tauri app (Windows)
        shell: bash
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -o pipefail
          cd src/main
          npx tauri build --verbose --bundles msi,nsis 2>&1
          echo "=== Exit code: $? ==="

      - name: List ALL build output
        shell: bash
        run: |
          echo "--- Full target directory listing ---"
          find src/main/target/release -maxdepth 1 -type f 2>/dev/null | head -20
          echo "--- Bundle directory ---"
          find src/main/target/release/bundle -type f 2>/dev/null || echo "No bundle directory"
          echo "--- Any .msi/.exe in target ---"
          find src/main/target -name '*.msi' -o -name '*.exe' 2>/dev/null | head -20
          echo "--- Signature files ---"
          find src/main/target -name '*.sig' 2>/dev/null | head -20

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            src/main/target/release/bundle/msi/
            src/main/target/release/bundle/nsis/
          if-no-files-found: error

  # -- macOS (Apple Silicon / arm64 only) --------------------------------
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - name: Ad-hoc sign sidecar for macOS bundling
        run: |
          codesign --force --sign - src/main/bin/agent-backend-aarch64-apple-darwin
          echo "Ad-hoc signed sidecar binary"

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify frontend dist
        run: |
          echo "--- dist/ contents ---"
          ls -la dist/ | head -20

      - name: Show tauri CLI version
        run: npx tauri --version

      - name: Show tauri info
        run: npx tauri info 2>&1 || true

      - name: Build Tauri app (macOS arm64)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -o pipefail
          cd src/main
          npx tauri build --verbose --bundles dmg --target aarch64-apple-darwin 2>&1
          echo "=== Exit code: $? ==="

      - name: List ALL build output
        run: |
          echo "--- Full target directory listing ---"
          find src/main/target/aarch64-apple-darwin/release -maxdepth 1 -type f 2>/dev/null | head -20
          echo "--- Bundle directory ---"
          find src/main/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "No bundle directory"
          echo "--- Any .dmg in target ---"
          find src/main/target -name '*.dmg' 2>/dev/null | head -20
          echo "--- Signature files ---"
          find src/main/target -name '*.sig' 2>/dev/null | head -20

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: src/main/target/aarch64-apple-darwin/release/bundle/dmg/
          if-no-files-found: error

  # -- Linux -------------------------------------------------------------
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify frontend dist
        run: |
          echo "--- dist/ contents ---"
          ls -la dist/ | head -20

      - name: Show tauri CLI version
        run: npx tauri --version

      - name: Show tauri info
        run: npx tauri info 2>&1 || true

      - name: Build Tauri app (Linux)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -o pipefail
          cd src/main
          npx tauri build --verbose --bundles deb,appimage 2>&1
          echo "=== Exit code: $? ==="

      - name: List ALL build output
        run: |
          echo "--- Full target directory listing ---"
          find src/main/target/release -maxdepth 1 -type f 2>/dev/null | head -20
          echo "--- Bundle directory ---"
          find src/main/target/release/bundle -type f 2>/dev/null || echo "No bundle directory"
          echo "--- Any .deb/.AppImage in target ---"
          find src/main/target -name '*.deb' -o -name '*.AppImage' 2>/dev/null | head -20
          echo "--- Signature files ---"
          find src/main/target -name '*.sig' 2>/dev/null | head -20

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            src/main/target/release/bundle/deb/
            src/main/target/release/bundle/appimage/
          if-no-files-found: error

  # -- Create Draft Release + latest.json ---------------------------------
  create-release:
    needs: [release-windows, release-macos, release-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | head -30

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Collect signatures
        id: signatures
        run: |
          echo "--- Finding signature files ---"
          find artifacts -name '*.sig' -type f | head -20

          # Windows NSIS .exe.sig
          EXE_SIG=""
          EXE_SIG_FILE=$(find artifacts -name '*.exe.sig' -type f | head -1)
          if [ -n "$EXE_SIG_FILE" ]; then
            EXE_SIG=$(cat "$EXE_SIG_FILE")
          fi

          # Windows MSI .msi.sig
          MSI_SIG=""
          MSI_SIG_FILE=$(find artifacts -name '*.msi.sig' -type f | head -1)
          if [ -n "$MSI_SIG_FILE" ]; then
            MSI_SIG=$(cat "$MSI_SIG_FILE")
          fi

          # macOS .dmg.sig
          DMG_SIG=""
          DMG_SIG_FILE=$(find artifacts -name '*.dmg.sig' -type f | head -1)
          if [ -n "$DMG_SIG_FILE" ]; then
            DMG_SIG=$(cat "$DMG_SIG_FILE")
          fi

          # Linux .AppImage.sig
          APPIMAGE_SIG=""
          APPIMAGE_SIG_FILE=$(find artifacts -name '*.AppImage.sig' -type f | head -1)
          if [ -n "$APPIMAGE_SIG_FILE" ]; then
            APPIMAGE_SIG=$(cat "$APPIMAGE_SIG_FILE")
          fi

          # Write outputs
          echo "exe_sig=${EXE_SIG}" >> "$GITHUB_OUTPUT"
          echo "msi_sig=${MSI_SIG}" >> "$GITHUB_OUTPUT"
          echo "dmg_sig=${DMG_SIG}" >> "$GITHUB_OUTPUT"
          echo "appimage_sig=${APPIMAGE_SIG}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          EXE_SIG: ${{ steps.signatures.outputs.exe_sig }}
          MSI_SIG: ${{ steps.signatures.outputs.msi_sig }}
          DMG_SIG: ${{ steps.signatures.outputs.dmg_sig }}
          APPIMAGE_SIG: ${{ steps.signatures.outputs.appimage_sig }}
        run: |
          REPO="Razisafir/construct-ai-agent"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          # Find actual filenames
          EXE_NAME=$(find artifacts -name '*.exe' ! -name '*.sig' -type f -exec basename {} \; | head -1)
          MSI_NAME=$(find artifacts -name '*.msi' ! -name '*.sig' -type f -exec basename {} \; | head -1)
          DMG_NAME=$(find artifacts -name '*.dmg' ! -name '*.sig' -type f -exec basename {} \; | head -1)
          APPIMAGE_NAME=$(find artifacts -name '*.AppImage' ! -name '*.sig' -type f -exec basename {} \; | head -1)

          # Build platforms object
          PLATFORMS="{}"

          if [ -n "$EXE_NAME" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${EXE_NAME}" --arg sig "$EXE_SIG" \
              '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          if [ -n "$MSI_NAME" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${MSI_NAME}" --arg sig "$MSI_SIG" \
              '. + {"windows-x86_64-msi": {"signature": $sig, "url": $url}}')
          fi

          if [ -n "$DMG_NAME" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${DMG_NAME}" --arg sig "$DMG_SIG" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          if [ -n "$APPIMAGE_NAME" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${APPIMAGE_NAME}" --arg sig "$APPIMAGE_SIG" \
              '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Generate latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Construct AI Agent v${VERSION}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: $platforms
            }' > latest.json

          echo "--- latest.json ---"
          cat latest.json

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            artifacts/windows-artifacts/msi/*.msi
            artifacts/windows-artifacts/nsis/*.exe
            artifacts/macos-artifacts/*.dmg
            artifacts/linux-artifacts/deb/*.deb
            artifacts/linux-artifacts/appimage/*.AppImage
            latest.json
          body: |
            Construct AI Agent desktop app release.
            See the assets below for downloadable installers.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
