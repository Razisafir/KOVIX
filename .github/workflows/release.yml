name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-action@stable

      - run: cargo install tauri-cli --locked
      - run: npm ci
      - run: cd src/main && cargo tauri build

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          cp src/main/target/release/bundle/msi/*.msi release/ || true
          cp src/main/target/release/bundle/nsis/*.exe release/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*

  # ── macOS ──────────────────────────────────────────────────────────────────
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - run: cargo install tauri-cli --locked
      - run: npm ci
      - run: cd src/main && cargo tauri build --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp src/main/target/release/bundle/dmg/*.dmg release/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/*

  # ── Linux ──────────────────────────────────────────────────────────────────
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-action@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - run: cargo install tauri-cli --locked
      - run: npm ci
      - run: cd src/main && cargo tauri build

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp src/main/target/release/bundle/deb/*.deb release/ || true
          cp src/main/target/release/bundle/appimage/*.AppImage release/ || true
          cp src/main/target/release/bundle/rpm/*.rpm release/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/*

  # ── Create GitHub Release ──────────────────────────────────────────────────
  create-release:
    needs: [release-windows, release-macos, release-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cat > RELEASE_NOTES.md << EOF
          # Construct AI Agent $VERSION

          ## Installation

          | Platform | Download |
          |----------|----------|
          | Windows (MSI) | \`*.msi\` below |
          | Windows (NSIS) | \`*.exe\` below |
          | macOS (Universal) | \`*.dmg\` below |
          | Linux (.deb) | \`*.deb\` below |
          | Linux (AppImage) | \`*.AppImage\` below |
          | Linux (RPM) | \`*.rpm\` below |

          ## Quick Start
          1. Download the installer for your platform
          2. Install and launch Construct
          3. Set your project path and goal
          4. Choose your LLM provider (local Ollama or cloud API)
          5. Start coding with your AI agent

          ## What's New
          See [CHANGELOG.md](../CHANGELOG.md) for full details.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          draft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
